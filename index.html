<style>
/* required styles */

.leaflet-pane,
.leaflet-tile,
.leaflet-marker-icon,
.leaflet-marker-shadow,
.leaflet-tile-container,
.leaflet-pane > svg,
.leaflet-pane > canvas,
.leaflet-zoom-box,
.leaflet-image-layer,
.leaflet-layer {
	position: absolute;
	left: 0;
	top: 0;
	}
.leaflet-container {
	overflow: hidden;
	}
.leaflet-tile,
.leaflet-marker-icon,
.leaflet-marker-shadow {
	-webkit-user-select: none;
	   -moz-user-select: none;
	        user-select: none;
	  -webkit-user-drag: none;
	}
/* Prevents IE11 from highlighting tiles in blue */
.leaflet-tile::selection {
	background: transparent;
}
/* Safari renders non-retina tile on retina better with this, but Chrome is worse */
.leaflet-safari .leaflet-tile {
	image-rendering: -webkit-optimize-contrast;
	}
/* hack that prevents hw layers "stretching" when loading new tiles */
.leaflet-safari .leaflet-tile-container {
	width: 1600px;
	height: 1600px;
	-webkit-transform-origin: 0 0;
	}
.leaflet-marker-icon,
.leaflet-marker-shadow {
	display: block;
	}

</script>
<style>
:root{
  --primary:#6D5AE6;        /* violet, from reference */
  --primary-600:#5B47D6;
  --primary-050:#EEEBFB;
  --accent:#F59E0B;         /* warm CTA accent */
  --teal:#0EA5A4;
  --bg:#F6F7FB;
  --panel:#FFFFFF;
  --ink:#1F2340;
  --ink-2:#4A4F6B;
  --muted:#8A90AC;
  --line:#ECEEF5;
  --good:#16A34A; --good-050:#E8F7EE;
  --warn:#F59E0B; --warn-050:#FEF3E1;
  --bad:#EF4444;  --bad-050:#FDECEC;
  --info:#3B82F6; --info-050:#E8F0FE;
  --shadow:0 8px 30px rgba(31,35,64,.06);
  --radius:14px;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif;font-size:14px;line-height:1.45}
h1,h2,h3,h4{font-family:Poppins,Inter,sans-serif;color:var(--ink);margin:0}
a{color:inherit;text-decoration:none}
button{font-family:inherit}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:#D6D9E6;border-radius:8px}

/* ---------- Layout primitives ---------- */
.hidden{display:none !important}
.row{display:flex;gap:16px}
.col{display:flex;flex-direction:column;gap:16px}
.grid{display:grid;gap:16px}
.center{display:flex;align-items:center;justify-content:center}
.between{display:flex;align-items:center;justify-content:space-between;gap:12px}
.tag{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:600;letter-spacing:.2px}
.tag.good{background:var(--good-050);color:var(--good)}
.tag.warn{background:var(--warn-050);color:#B45309}
.tag.bad{background:var(--bad-050);color:var(--bad)}
.tag.info{background:var(--info-050);color:var(--info)}
.tag.muted{background:#EEF0F6;color:var(--ink-2)}
.card{background:var(--panel);border-radius:var(--radius);box-shadow:var(--shadow);padding:18px;border:1px solid var(--line)}
.btn{display:inline-flex;align-items:center;gap:8px;background:var(--primary);color:#fff;border:none;padding:10px 16px;border-radius:10px;font-weight:600;cursor:pointer;transition:transform .12s ease, box-shadow .2s ease, background .2s ease}
.btn:hover{background:var(--primary-600);box-shadow:0 8px 18px rgba(109,90,230,.28)}
.btn:active{transform:translateY(1px) scale(.99)}
.btn.ghost{background:transparent;color:var(--ink);border:1px solid var(--line)}
.btn.ghost:hover{background:#F1F3FA;box-shadow:none}
.btn.accent{background:var(--accent)}
.btn.accent:hover{background:#D97706;box-shadow:0 8px 18px rgba(245,158,11,.32)}
.btn.danger{background:var(--bad)}
.btn.sm{padding:6px 12px;font-size:12px;border-radius:8px}
.input,select,textarea{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:10px;background:#fff;font-family:inherit;font-size:14px;color:var(--ink);transition:border .15s, box-shadow .15s}
.input:focus,select:focus,textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-050)}
label.field{display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--ink-2);font-weight:500}
.kpi{background:#fff;border-radius:var(--radius);padding:16px;border:1px solid var(--line);box-shadow:var(--shadow);position:relative;overflow:hidden}
.kpi .val{font-size:26px;font-family:Poppins;font-weight:700;margin-top:6px}
.kpi .lbl{color:var(--muted);font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.4px}
.kpi .icon{width:40px;height:40px;border-radius:12px;display:grid;place-items:center;font-size:18px}
.kpi .delta{font-size:12px;margin-top:6px;font-weight:600}
.delta.up{color:var(--good)} .delta.down{color:var(--bad)}
.table{width:100%;border-collapse:separate;border-spacing:0}
.table th,.table td{padding:12px 14px;text-align:left;font-size:13px;border-bottom:1px solid var(--line)}
.table th{font-weight:600;color:var(--muted);text-transform:uppercase;font-size:11px;letter-spacing:.5px;background:#FAFBFE}
.table tr:hover td{background:#FAFBFE}
.section-title{font-size:16px;font-weight:700;margin-bottom:12px;font-family:Poppins}
.subtle{color:var(--muted);font-size:12px}
.divider{height:1px;background:var(--line);margin:14px 0}

/* animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
.page{animation:fadeIn .28s ease both}
.skeleton{background:linear-gradient(90deg,#EEF0F6 0%,#F7F8FC 50%,#EEF0F6 100%);background-size:800px 100%;animation:shimmer 1.4s linear infinite;border-radius:8px;min-height:14px}
.spinner{width:18px;height:18px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;display:inline-block;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

/* ---------- App shell ---------- */
#app{min-height:100vh}

/* Landing */
.landing{min-height:100vh;background:
  radial-gradient(1200px 500px at 10% -10%, #EEEBFB 0%, transparent 60%),
  radial-gradient(900px 500px at 100% 0%, #FEF3E1 0%, transparent 60%),
  #F6F7FB;
  display:flex;flex-direction:column}
.landing .nav{display:flex;justify-content:space-between;align-items:center;padding:20px 40px}
.brand{display:flex;align-items:center;gap:10px;font-family:Poppins;font-weight:700;font-size:18px}
.brand .logo{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--primary),#9B8CF2);display:grid;place-items:center;color:#fff;font-weight:800}
.landing .hero{max-width:1120px;margin:20px auto;padding:24px 40px;display:grid;grid-template-columns:1.1fr .9fr;gap:40px;align-items:center}
.hero h1{font-size:44px;line-height:1.1;font-weight:800}
.hero h1 span{color:var(--primary)}
.hero p{color:var(--ink-2);font-size:16px;margin-top:14px;max-width:520px}
.hero .cta{display:flex;gap:12px;margin-top:22px;flex-wrap:wrap}

function pendingKpi(t,v,s,c,bg){
  return `<div class="card" style="display:flex;gap:14px;align-items:center">
    <div class="icon" style="width:52px;height:52px;border-radius:14px;background:${bg};color:${c};display:grid;place-items:center;font-size:22px">⚠️</div>

    <div style="font-size:24px;font-weight:800;font-family:Poppins;color:${c}">${v}</div>
    <div class="subtle">${s}</div></div>
    <button class="btn ghost sm">View</button>
  </div>`;
}

function kpi(ico,lbl,val,delta,dir,bg,c){
  return `<div class="kpi mini">
    <div class="between">
      <div class="icon" style="background:${bg};color:${c}">${ico}</div>
      <span class="delta ${dir}">${dir==='up'?'▲':'▼'} ${delta.split(' ')[0]}</span>
    </div>
    <div class="lbl" style="margin-top:8px">${lbl}</div>
    <div class="val">${val}</div>
    <div class="spark"><canvas></canvas></div>
  </div>`;
}
function statusTag(s){
  const map={
    "Active":"good","Confirmed (Advance Paid)":"good","Completed":"good","Paid":"good",
    "Held":"warn","Renewal Pending":"warn","Pending":"warn","Renewal Due":"warn",
    "Expired – To Be Vacated":"bad","Overdue":"bad","Cancelled":"bad"
  };
  return `<span class="tag ${map[s]||'muted'}">${s}</span>`;
}

function drawDashCharts(){
  // spark lines
  document.querySelectorAll(".kpi .spark canvas").forEach((cv,i)=>{
    const colors=["#6D5AE6","#3B82F6","#16A34A","#F59E0B","#EF4444"];
    new Chart(cv,{type:"line",data:{labels:Array(12).fill(""),datasets:[{data:Array.from({length:12},()=>Math.random()*100),borderColor:colors[i],backgroundColor:colors[i]+"22",fill:true,tension:.4,borderWidth:2,pointRadius:0}]},
      options:{plugins:{legend:{display:false},tooltip:{enabled:false}},scales:{x:{display:false},y:{display:false}},elements:{line:{borderJoinStyle:"round"}},maintainAspectRatio:false}});
  });
  // revenue
  new Chart(document.getElementById("cRev"),{type:"line",
    data:{labels:["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"],
      datasets:[{label:"Revenue (₹L)",data:[120,138,142,151,148,167,172,180,175,184,192,205],borderColor:"#6D5AE6",backgroundColor:"rgba(109,90,230,.15)",fill:true,tension:.4,borderWidth:3,pointBackgroundColor:"#6D5AE6",pointRadius:4,pointHoverRadius:7}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{backgroundColor:"#1F2340",padding:10,cornerRadius:8}}}});
  // occupancy doughnut
  new Chart(document.getElementById("cOcc"),{type:"doughnut",
    data:{labels:["Shops","Halls","Grounds","Markets","Buildings"],datasets:[{data:[86,72,54,91,78],backgroundColor:["#6D5AE6","#F59E0B","#16A34A","#3B82F6","#EF4444"],borderWidth:0}]},
    options:{cutout:"65%",plugins:{legend:{position:"right",labels:{boxWidth:10,padding:12,font:{size:11}}}},maintainAspectRatio:false}});
  // demand
  new Chart(document.getElementById("cDem"),{type:"bar",
    data:{labels:["Jan","Feb","Mar","Apr","May","Jun"],datasets:[
      {label:"Demand",data:[120,140,160,150,180,200],backgroundColor:"#EEEBFB",borderRadius:6},
      {label:"Actual",data:[95,120,135,140,160,175],backgroundColor:"#6D5AE6",borderRadius:6}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:"bottom",labels:{boxWidth:10}}},scales:{x:{grid:{display:false}},y:{grid:{color:"#F0F1F7"}}}}});
}

/* ---- Booking (slot availability) ---- */
function tBooking(m){
  const monthName = state.calMonth.toLocaleString("en-US",{month:"long",year:"numeric"});
  const first = new Date(state.calMonth); first.setDate(1);
  const start = first.getDay(); const dim = new Date(first.getFullYear(),first.getMonth()+1,0).getDate();
  const cells = [];
  for(let i=0;i<start;i++) cells.push({o:true});
  for(let d=1;d<=dim;d++){
    const st = BOOKED_DAYS[d]||"";
    cells.push({d,st});
  }
  m.innerHTML = tenantTop("Event Booking","Booking","Pick an available day — advance blocks the date.") + `
  <div class="grid" style="grid-template-columns:1.3fr 1fr">
    <div class="cal">
      <div class="head"><button class="btn ghost sm" onclick="calMove(-1)">‹</button><b>${monthName}</b><button class="btn ghost sm" onclick="calMove(1)">›</button></div>
      <div class="grid7">${["Sun","Mon","Tue","Wed","Thu","Fri","Sat"].map(d=>`<div class="dow">${d}</div>`).join("")}</div>
      <div class="grid7" style="margin-top:4px">
        ${cells.map(c=>{
          if(c.o) return `<div class="cell other"></div>`;
          const cls = c.st==="blocked"?"blocked":c.st==="held"?"held":"";
          const sel = state.selectedDate===c.d ? "selected":"";
          const click = c.st==="blocked" ? "" : `onclick="selDate(${c.d})"`;
          return `<div class="cell ${cls} ${sel}" ${click}>${c.d}</div>`;
        }).join("")}
      </div>
      <div class="legend">
        <span><span class="sw" style="background:#fff;border:1px solid var(--line)"></span>Available</span>
        <span><span class="sw" style="background:#FDECEC"></span>Blocked / Booked</span>
        <span><span class="sw" style="background:#FEF3E1"></span>Held / Pending</span>
        <span><span class="sw" style="background:var(--primary)"></span>Your selection</span>
      </div>
    </div>
    <div class="card">
      <h3 class="section-title">Price Breakdown</h3>
      <div class="between" style="padding:10px;border-bottom:1px dashed var(--line)"><span>Venue charge (per day)</span><b>₹65,000</b></div>
      <div class="between" style="padding:10px;border-bottom:1px dashed var(--line);color:var(--warn)"><span>Advance (25% – due now)</span><b>₹16,250</b></div>
      <div class="between" style="padding:10px;border-bottom:1px dashed var(--line)"><span>Balance (due on event day)</span><b>₹48,750</b></div>
      <div class="between" style="padding:10px"><span>GST (18%)</span><b>₹11,700</b></div>
      <div class="between" style="padding:12px;background:#F8F9FE;border-radius:10px;margin-top:8px"><span><b>Total</b></span><b style="color:var(--primary);font-size:18px">₹76,700</b></div>
      <p class="subtle" style="margin-top:12px">Selected date: <b style="color:var(--ink)">${state.selectedDate?monthName.split(' ')[0]+' '+state.selectedDate+', 2026':'— pick a date'}</b></p>
      <button class="btn accent" style="width:100%;justify-content:center;margin-top:8px" ${state.selectedDate?'':'disabled style="opacity:.5"'} onclick="go('tenant','checkout')">💳 Pay Advance & Block Date</button>
    </div>
  </div>`;
}

window.advSel=(el,n)=>{
  document.querySelectorAll("#advTabs button").forEach(b=>b.classList.remove("active"));
  el.classList.add("active");
  document.getElementById("advAmt").textContent = "₹"+(56000*n).toLocaleString();
  const months = ["Jul","Aug","Sep","Oct","Nov","Dec","Jan","Feb","Mar","Apr","May","Jun","Jul"];
  document.getElementById("advDate").textContent = months[n]+" 10, "+(n>=6?2027:2026);
};

/* ============================== MODAL & TOAST ============================== */
window.openModal=(html)=>{document.getElementById("modal").innerHTML=html;document.getElementById("modalBack").classList.add("show")};
window.closeModal=()=>document.getElementById("modalBack").classList.remove("show");
document.getElementById("modalBack").addEventListener("click",e=>{if(e.target.id==="modalBack") closeModal()});
window.toast=(msg)=>{
  const t=document.createElement("div");
  t.textContent=msg;
  Object.assign(t.style,{position:"fixed",bottom:"80px",left:"50%",transform:"translateX(-50%)",background:"#1F2340",color:"#fff",padding:"10px 18px",borderRadius:"10px",zIndex:9999,boxShadow:"0 10px 30px rgba(0,0,0,.2)",animation:"fadeIn .25s ease"});
  document.body.appendChild(t); setTimeout(()=>t.remove(),1800);
};
